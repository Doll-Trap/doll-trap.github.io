services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doll-trap-api
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      NODE_OPTIONS: --dns-result-order=ipv4first
    ports:
      - "8000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

networks:
  default:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.28.0.0/16"
        - subnet: "2001:db8:2::/64"
