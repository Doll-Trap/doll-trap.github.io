<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - Doll Trap</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* ── Retro Video Window ── */
      #videoPlayerModal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(30, 20, 50, 0.72);
        backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
      }

      .vw-window {
        width: min(700px, 95vw);
        background: #d0c0e8;
        border: 3px solid #8a7aaa;
        border-radius: 4px;
        box-shadow:
          inset 2px 2px 0 rgba(255,255,255,0.55),
          inset -2px -2px 0 rgba(0,0,0,0.18),
          6px 6px 0 #5a4878,
          10px 10px 0 rgba(90,72,120,0.25);
        animation: vwPop 0.15s ease;
      }

      @keyframes vwPop {
        from { transform: scale(0.92); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
      }

      .vw-bar {
        background: linear-gradient(90deg, #6a4e9a, #8a6aba);
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #4a3878;
        cursor: default;
      }

      .vw-title {
        color: white;
        font-family: 'Press Start 2P', monospace;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
      }

      .vw-btns {
        display: flex;
        gap: 4px;
      }

      .vw-btn {
        width: 26px;
        height: 22px;
        background: #c8b0e0;
        border: 2px solid #7a6aaa;
        border-top-color: rgba(255,255,255,0.7);
        border-left-color: rgba(255,255,255,0.7);
        color: #3a2860;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
        font-family: monospace;
      }

      .vw-btn:active {
        border-top-color: rgba(0,0,0,0.3);
        border-left-color: rgba(0,0,0,0.3);
        border-bottom-color: rgba(255,255,255,0.5);
        border-right-color: rgba(255,255,255,0.5);
      }

      .vw-close { color: #8a1040; }

      .vw-screen {
        background: #2a1e42;
        aspect-ratio: 16 / 9;
        border: 3px solid #4a3878;
        border-top-color: #1a1030;
        border-left-color: #1a1030;
        margin: 8px;
      }

      .vw-screen iframe {
        width: 100%;
        height: 100%;
        display: block;
        border: none;
      }

      .vw-info {
        padding: 8px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .vw-video-title {
        font-family: 'Press Start 2P', monospace;
        font-size: 9px;
        color: #4a3070;
        line-height: 1.6;
      }

      /* ── Retro card (inline on page) ── */
      .vw-card {
        background: #d0c0e8;
        border: 3px solid #8a7aaa;
        border-radius: 4px;
        box-shadow:
          inset 2px 2px 0 rgba(255,255,255,0.55),
          inset -2px -2px 0 rgba(0,0,0,0.18),
          6px 6px 0 #5a4878,
          10px 10px 0 rgba(90,72,120,0.25);
      }

      /* grid of cards */
      #videosGrid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 500px));
        gap: 32px;
        justify-content: center;
      }
    </style>
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="videos.html" class="nav-active">Videos</a>
      <a href="#contact">Contact</a>
      <a id="loginNavBtn" href="portal.html">🔑 Log In</a>
    </nav>

    <!-- Retro Video Player Modal -->
    <div id="videoPlayerModal">
      <div class="vw-window">
        <div class="vw-bar">
          <span class="vw-title">Doll Trap</span>
          <div class="vw-btns">
            <button class="vw-btn">□</button>
            <button class="vw-btn">—</button>
            <button class="vw-btn vw-close" onclick="closeVideoModal()">✕</button>
          </div>
        </div>
        <div class="vw-screen">
          <iframe id="videoPlayerFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="vw-info">
          <span id="videoPlayerTitle" class="vw-video-title"></span>
        </div>
      </div>
    </div>

    <!-- Videos Section -->
    <div class="videos-container">
      <h1>Videos</h1>

      <!-- Event Filter -->
      <div class="video-filter-bar" id="videoFilterBar">
        <button class="filter-btn active" onclick="filterVideosByEvent('all', this)">All Videos</button>
      </div>

      <!-- Videos Grid -->
      <div id="videosGrid" class="videos-grid">
        <div class="videos-loading">Loading videos…</div>
      </div>
    </div>

    <footer>
      Follow Doll Trap on
      <a href="https://www.instagram.com/kyk_doll_trap?igsh=MWR5ZDhnNTRvdjA4ZQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
      <span>·</span>
      <a href="https://xhslink.com/m/AtFuH3oz3Lz" target="_blank" rel="noopener noreferrer">Xiaohongshu</a>
      <span>·</span>
      <a href="https://youtube.com/@ksm_doll_trap?si=y9Q1hdPEBzB3alXG" target="_blank" rel="noopener noreferrer">YouTube</a>
    </footer>

    <script>
      const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'http://localhost:8787/api'
        : 'https://api.dolltrap.workers.dev/api';
      const authToken = localStorage.getItem('authToken');
      let allVideos = [];
      let currentEventFilter = 'all';

      function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
      }
      function updateNavLoginState() {
        const btn = document.getElementById('loginNavBtn');
        if (!btn) return;
        const adminTok = localStorage.getItem('authToken');
        const memberTok = localStorage.getItem('memberToken');
        if (adminTok) {
          const p = parseJwt(adminTok);
          btn.textContent = '⚙️ ' + (p?.username || 'Admin');
          btn.href = 'admin.html';
          btn.style.background = 'linear-gradient(135deg, #7c3aed, #ec4899)';
        } else if (memberTok) {
          const p = parseJwt(memberTok);
          btn.textContent = '🎀 ' + (p?.display_name || 'Portal');
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(135deg, #d946a6, #ec4899)';
        } else {
          btn.textContent = '🔑 Log In';
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(135deg, #d946a6, #ec4899)';
        }
      }

      // Extract embed URL from various platforms
      function getEmbedUrl(url) {
        if (!url) return null;

        // YouTube
        const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
        if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&rel=0`;

        // Bilibili
        const bvMatch = url.match(/bilibili\.com\/video\/(BV[A-Za-z0-9]+)/i);
        if (bvMatch) return `https://player.bilibili.com/player.html?bvid=${bvMatch[1]}&autoplay=1&high_quality=1`;
        const avMatch = url.match(/bilibili\.com\/video\/av(\d+)/i);
        if (avMatch) return `https://player.bilibili.com/player.html?aid=${avMatch[1]}&autoplay=1&high_quality=1`;

        // Vimeo
        const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
        if (vimeoMatch) return `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1`;

        return null;
      }

      // Keep for thumbnail generation
      function getYouTubeId(url) {
        const m = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      // Get thumbnail URL for a video
      function getVideoThumbnail(video) {
        if (video.thumbnail_url) return video.thumbnail_url;
        const ytId = getYouTubeId(video.url);
        if (ytId) return `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
        return null;
      }

      function renderVideos(videos) {
        const grid = document.getElementById('videosGrid');
        if (videos.length === 0) {
          grid.innerHTML = '<div class="videos-empty">No videos yet. Check back soon! 🎬</div>';
          return;
        }
        grid.innerHTML = videos.map(v => {
          const embedUrl = getEmbedUrl(v.url);
          const eventBadge = v.event_title
            ? `<span class="video-event-badge">📅 ${v.event_title}</span>`
            : '';
          const descHtml = v.description
            ? `<p class="video-desc">${v.description}</p>`
            : '';
          if (embedUrl) {
            const noAutoplay = embedUrl.replace('?autoplay=1', '').replace('&autoplay=1', '');
            return `
              <div class="vw-card">
                <div class="vw-bar">
                  <span class="vw-title">Doll Trap</span>
                  <div class="vw-btns">
                    <button class="vw-btn">□</button>
                    <button class="vw-btn">—</button>
                    <button class="vw-btn vw-close">✕</button>
                  </div>
                </div>
                <div class="vw-screen">
                  <iframe src="${noAutoplay}"
                    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen loading="lazy" frameborder="0"></iframe>
                </div>
                <div class="vw-info">
                  ${eventBadge}
                  <span class="vw-video-title">${v.title}</span>
                  ${descHtml}
                </div>
              </div>
            `;
          } else {
            const thumb = getVideoThumbnail(v);
            return `
              <a class="video-card" href="${v.url}" target="_blank" rel="noopener noreferrer">
                <div class="video-thumb">
                  ${thumb ? `<img src="${thumb}" alt="${v.title}" class="video-thumb-img" loading="lazy">` : '<div class="video-thumb-placeholder">🎬</div>'}
                  <div class="video-play-overlay">▶</div>
                </div>
                <div class="video-info">
                  ${eventBadge}
                  <h3 class="video-title">${v.title}</h3>
                  ${descHtml}
                </div>
              </a>
            `;
          }
        }).join('');
      }

      function openVideoModal(embedUrl, title) {
        const modal = document.getElementById('videoPlayerModal');
        document.getElementById('videoPlayerFrame').src = embedUrl;
        document.getElementById('videoPlayerTitle').textContent = title || '';
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      function closeVideoModal() {
        const modal = document.getElementById('videoPlayerModal');
        modal.style.display = 'none';
        document.getElementById('videoPlayerFrame').src = '';
        document.body.style.overflow = '';
      }

      document.getElementById('videoPlayerModal').addEventListener('click', function(e) {
        if (e.target === this) closeVideoModal();
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeVideoModal();
      });

      function filterVideosByEvent(eventId, btn) {
        currentEventFilter = eventId;
        document.querySelectorAll('.video-filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        const filtered = eventId === 'all'
          ? allVideos
          : allVideos.filter(v => String(v.event_id) === String(eventId));
        renderVideos(filtered);
      }

      function buildFilterBar(videos) {
        const bar = document.getElementById('videoFilterBar');
        // Collect unique events
        const seen = new Set();
        const eventList = [];
        videos.forEach(v => {
          if (v.event_id && !seen.has(v.event_id)) {
            seen.add(v.event_id);
            eventList.push({ id: v.event_id, title: v.event_title });
          }
        });
        // Only show filter bar if there are multiple events
        if (eventList.length < 2) {
          bar.style.display = 'none';
          return;
        }
        bar.style.display = 'flex';
        bar.innerHTML = `<button class="filter-btn active" onclick="filterVideosByEvent('all', this)">All Videos</button>`;
        eventList.forEach(ev => {
          bar.innerHTML += `<button class="filter-btn" onclick="filterVideosByEvent('${ev.id}', this)">📅 ${ev.title}</button>`;
        });
      }

      async function loadVideos() {
        try {
          const res = await fetch(`${API_URL}/videos`);
          if (!res.ok) throw new Error('Failed to load videos');
          allVideos = await res.json();
          buildFilterBar(allVideos);
          renderVideos(allVideos);
        } catch (err) {
          document.getElementById('videosGrid').innerHTML =
            `<div class="videos-empty">Couldn't load videos. Please try again later.</div>`;
        }
      }

      updateNavLoginState();
      loadVideos();
    </script>
  </body>
</html>
