<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Doll Trap</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Calendar</a>
      <a href="gallery.html">Gallery</a>
      <a href="#contact">Contact</a>
      <a id="loginNavBtn" href="admin.html">Admin Login</a>
    </nav>

    <!-- Gallery Section -->
    <div class="gallery-container">
      <h1>Gallery</h1>

      <div class="filter-section">
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
          <label style="color: #777; width: 100%; font-size: 14px;">Filter by Member:</label>
          <button class="filter-btn active" onclick="filterByMember('')">All Members</button>
          <button class="filter-btn" onclick="filterByMember('Buzzly')">Buzzly</button>
          <button class="filter-btn" onclick="filterByMember('Kokona')">Kokona</button>
          <button class="filter-btn" onclick="filterByMember('Hitomi')">Hitomi</button>
          <button class="filter-btn" onclick="filterByMember('Group')">Group</button>
        </div>
      </div>

      <div id="folderContainer" class="gallery-grid"></div>

      <div id="albumView" style="display: none; margin-top: 20px;">
        <button id="backToFoldersBtn" class="filter-btn" style="margin-bottom: 16px;">← Back to Albums</button>
        <h2 id="albumTitle" class="event-title"></h2>

        <!-- Event Detail Banner -->
        <div id="eventDetailBanner" class="event-detail-header" style="display: none;">
          <div id="eventDetailPosterWrap" class="event-detail-poster">
            <img id="eventDetailPoster" src="" alt="Event Poster">
          </div>
          <div class="event-detail-info">
            <div id="eventDetailDate" class="event-detail-row" style="display:none;"></div>
            <div id="eventDetailLocation" class="event-detail-row" style="display:none;"></div>
            <div id="eventDetailDesc" class="event-detail-row" style="display:none;"></div>
          </div>
        </div>

        <div id="albumMeta" style="color: #777; margin-bottom: 16px;"></div>
        <div id="albumGrid" class="gallery-grid"></div>
      </div>

      <footer>
        Follow Doll Trap on
        <a href="https://www.instagram.com/kyk_doll_trap?igsh=MWR5ZDhnNTRvdjA4ZQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
        <span>·</span>
        <a href="https://xhslink.com/m/AtFuH3oz3Lz" target="_blank" rel="noopener noreferrer">Xiaohongshu</a>
        <span>·</span>
        <a href="https://youtube.com/@ksm_doll_trap?si=y9Q1hdPEBzB3alXG" target="_blank" rel="noopener noreferrer">YouTube</a>
      </footer>

    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal">
      <span class="close">&times;</span>
      <button id="modalPrevBtn" class="image-modal-nav image-modal-prev" type="button" aria-label="Previous image">‹</button>
      <img id="modalImage" src="" alt="Zoomed Image">
      <button id="modalNextBtn" class="image-modal-nav image-modal-next" type="button" aria-label="Next image">›</button>
    </div>

    <script>
      const API_URL = 'https://doll-trap-github-io.onrender.com/api';
      const API_ORIGIN = API_URL.replace('/api', '');
      const authToken = localStorage.getItem('authToken');
      let currentModalPhotos = [];
      let currentModalIndex = 0;

      function updateAdminLinkState() {
        const loginButton = document.getElementById('loginNavBtn');
        if (!loginButton) return;

        if (authToken) {
          loginButton.textContent = 'Admin Dashboard';
          loginButton.style.background = 'linear-gradient(135deg, #7c3aed, #ec4899)';
        } else {
          loginButton.textContent = 'Admin Login';
          loginButton.style.background = 'linear-gradient(135deg, #d946a6, #ec4899)';
        }
      }

      let allPhotos = [];
      let allEvents = [];
      let currentMemberFilter = '';

      function getEventKind(event) {
        return event.kind || (event.date ? 'event' : 'album');
      }

      function getCollectionTypeLabel(event) {
        return getEventKind(event) === 'album' ? 'Album' : 'Event';
      }

      function resolvePhotoUrl(photo) {
        return photo.photo_url.startsWith('http') ? photo.photo_url : `${API_ORIGIN}${photo.photo_url}`;
      }

      function getAlbumCover(event, photos) {
        if (photos.length > 0) {
          return resolvePhotoUrl(photos[0]);
        }

        if (event.image_url) {
          return event.image_url.startsWith('http') ? event.image_url : `${API_ORIGIN}${event.image_url}`;
        }

        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#1e3a8a"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
            <rect width="800" height="600" fill="url(#bg)"/>
            <text x="400" y="285" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="38" font-weight="bold">${event.title || 'Album'}</text>
            <text x="400" y="335" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif" font-size="24">No photos yet</text>
          </svg>
        `)}`;
      }

      function showModalPhoto(index) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        if (!currentModalPhotos.length) {
          return;
        }

        currentModalIndex = (index + currentModalPhotos.length) % currentModalPhotos.length;
        modalImg.src = currentModalPhotos[currentModalIndex];
        modal.style.display = 'block';
      }

      function openImageModal(index) {
        showModalPhoto(index);
      }

      function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
      }

      function goToPreviousModalPhoto() {
        showModalPhoto(currentModalIndex - 1);
      }

      function goToNextModalPhoto() {
        showModalPhoto(currentModalIndex + 1);
      }

      function setupImageModal() {
        const modal = document.getElementById('imageModal');
        const closeBtn = document.querySelector('.close');
        const prevBtn = document.getElementById('modalPrevBtn');
        const nextBtn = document.getElementById('modalNextBtn');

        if (modal.dataset.initialized === 'true') {
          return;
        }

        modal.dataset.initialized = 'true';

        closeBtn.addEventListener('click', closeImageModal);

        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          goToPreviousModalPhoto();
        });

        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          goToNextModalPhoto();
        });

        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeImageModal();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (modal.style.display !== 'block') {
            return;
          }

          if (e.key === 'Escape') {
            closeImageModal();
          } else if (e.key === 'ArrowLeft') {
            goToPreviousModalPhoto();
          } else if (e.key === 'ArrowRight') {
            goToNextModalPhoto();
          }
        });
      }

      function filterByMember(member) {
        currentMemberFilter = member;
        
        // Update button styles
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        renderFolderCards();
      }

      function renderFolderCards() {
        const folderContainer = document.getElementById('folderContainer');
        const albumView = document.getElementById('albumView');
        albumView.style.display = 'none';
        folderContainer.style.display = 'grid';

        // Apply member filter
        const filteredPhotos = currentMemberFilter 
          ? allPhotos.filter(p => p.member_tag === currentMemberFilter)
          : allPhotos;

        const collections = allEvents
          .map(event => {
            const photos = filteredPhotos.filter(p => String(p.event_id) === String(event.id));

            if (photos.length === 0) {
              return null;
            }

            const typeLabel = getCollectionTypeLabel(event);
            const subtitle = event.event_category || typeLabel;

            return {
              key: `event-${event.id}`,
              title: event.title,
              subtitle,
              typeLabel,
              count: photos.length,
              cover: getAlbumCover(event, photos)
            };
          })
          .filter(Boolean);

        const unassignedPhotos = filteredPhotos.filter(photo => !photo.event_id);
        if (unassignedPhotos.length > 0) {
          collections.push({
            key: 'unassigned',
            title: 'Other Photos',
            subtitle: 'Unassigned',
            typeLabel: 'Collection',
            count: unassignedPhotos.length,
            cover: resolvePhotoUrl(unassignedPhotos[0])
          });
        }

        const folders = collections;

        if (folders.length === 0) {
          folderContainer.innerHTML = '<p style="color:#999; grid-column:1/-1; text-align:center;">No albums yet</p>';
          return;
        }

        folderContainer.innerHTML = folders.map(folder => `
          <div class="gallery-item" style="cursor:pointer;" onclick="openAlbum('${folder.key}')">
            <img src="${folder.cover}" alt="${folder.title}" title="${folder.title}">
            <p class="photo-member">${folder.title}</p>
          </div>
        `).join('');
      }

      function openAlbum(key) {
        const folderContainer = document.getElementById('folderContainer');
        const albumView = document.getElementById('albumView');
        const albumTitle = document.getElementById('albumTitle');
        const albumMeta = document.getElementById('albumMeta');
        const albumGrid = document.getElementById('albumGrid');
        const eventDetailBanner = document.getElementById('eventDetailBanner');
        const posterWrap = document.getElementById('eventDetailPosterWrap');
        const posterImg = document.getElementById('eventDetailPoster');
        const dateEl = document.getElementById('eventDetailDate');
        const locationEl = document.getElementById('eventDetailLocation');
        const descEl = document.getElementById('eventDetailDesc');

        // Apply member filter
        const filteredPhotos = currentMemberFilter 
          ? allPhotos.filter(p => p.member_tag === currentMemberFilter)
          : allPhotos;

        let title = '';
        let meta = '';
        let photos = [];

        if (key.startsWith('event-')) {
          const eventId = key.replace('event-', '');
          const eventObj = allEvents.find(e => String(e.id) === eventId);
          photos = filteredPhotos.filter(p => String(p.event_id) === eventId);
          title = eventObj?.title || 'Album';
          meta = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

          if (eventObj) {
            // Date & time
            if (eventObj.date) {
              const d = new Date(eventObj.date);
              const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
              const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
              const endStr = eventObj.end_time ? ` – ${eventObj.end_time.slice(0,5)}` : '';
              dateEl.innerHTML = `📅 <strong>${dateStr}</strong> · ${timeStr}${endStr}`;
              dateEl.style.display = 'block';
            } else {
              dateEl.style.display = 'none';
            }

            // Location
            if (eventObj.location) {
              locationEl.innerHTML = `📍 ${eventObj.location}`;
              locationEl.style.display = 'block';
            } else {
              locationEl.style.display = 'none';
            }

            // Description
            if (eventObj.description) {
              descEl.innerHTML = eventObj.description;
              descEl.style.display = 'block';
            } else {
              descEl.style.display = 'none';
            }

            // Poster
            if (eventObj.image_url) {
              const posterUrl = eventObj.image_url.startsWith('http') ? eventObj.image_url : `${API_ORIGIN}${eventObj.image_url}`;
              posterImg.src = posterUrl;
              posterWrap.style.display = 'block';
            } else {
              posterWrap.style.display = 'none';
            }

            const hasDetails = eventObj.date || eventObj.location || eventObj.description || eventObj.image_url;
            eventDetailBanner.style.display = hasDetails ? 'flex' : 'none';
          } else {
            eventDetailBanner.style.display = 'none';
          }
        } else if (key === 'unassigned') {
          photos = filteredPhotos.filter(photo => !photo.event_id);
          title = 'Other Photos';
          meta = `Collection · ${photos.length} photos`;
          eventDetailBanner.style.display = 'none';
        }

        albumTitle.textContent = title;
        albumMeta.textContent = meta;
        currentModalPhotos = photos.map(photo => resolvePhotoUrl(photo));
        currentModalIndex = 0;

        albumGrid.innerHTML = photos.map((photo, index) => {
          const url = resolvePhotoUrl(photo);
          const memberTag = photo.member_tag || 'Group';
          return `
            <div class="gallery-item">
              <img src="${url}" alt="${photo.caption || 'Photo'}" title="${photo.caption || ''}" onclick="openImageModal(${index})">
              <p class="photo-member">${memberTag}</p>
            </div>
          `;
        }).join('');

        folderContainer.style.display = 'none';
        albumView.style.display = 'block';
        setupImageModal();
      }

      document.getElementById('backToFoldersBtn').addEventListener('click', () => {
        document.getElementById('albumView').style.display = 'none';
        document.getElementById('folderContainer').style.display = 'grid';
      });

      async function loadGallery() {
        try {
          const [photosResponse, eventsResponse] = await Promise.all([
            fetch(`${API_URL}/photos`),
            fetch(`${API_URL}/events`)
          ]);

          allPhotos = await photosResponse.json();
          allEvents = await eventsResponse.json();

          renderFolderCards();
          setupImageModal();

          // Auto-open album from URL hash (e.g., gallery.html#event-24)
          const hashKey = window.location.hash.replace('#', '');
          if (hashKey.startsWith('event-') || hashKey === 'unassigned') {
            openAlbum(hashKey);
          }
        } catch (error) {
          console.error('Error loading gallery:', error);
          document.getElementById('folderContainer').innerHTML = '<p style="color: #999;">Error loading albums</p>';
        }
      }

      updateAdminLinkState();
      loadGallery();
    </script>
  </body>
</html>
