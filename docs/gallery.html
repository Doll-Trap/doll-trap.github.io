<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Doll Trap</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Header -->
    <header>
      DOLL TRAP
    </header>

    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Calendar</a>
      <a href="gallery.html">Gallery</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- Gallery Section -->
    <div class="gallery-container">
      <h1>Gallery</h1>

      <div class="filter-section">
        <div class="filter-group">
          <h3>Category</h3>
          <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="performance">Performance</button>
            <button class="filter-btn" data-filter="rehearsal">Rehearsal</button>
            <button class="filter-btn" data-filter="photoshoot">Photoshoot</button>
            <button class="filter-btn" data-filter="visuals">Visuals</button>
            <button class="filter-btn" data-filter="behind-the-scenes">Behind the Scenes</button>
          </div>
        </div>

        <div class="filter-group">
          <h3>Member</h3>
          <div class="member-filters">
            <button class="member-filter-btn active" data-member="all">All Members</button>
            <button class="member-filter-btn" data-member="buzzly">Buzzly (Pink)</button>
            <button class="member-filter-btn" data-member="kokona">Kokona (Blue)</button>
            <button class="member-filter-btn" data-member="hitomi">Hitomi (Red)</button>
          </div>
        </div>

        <div class="filter-group">
          <h3>Event</h3>
          <div class="event-filters">
            <button class="event-filter-btn active" data-event="all">All Events</button>
            <button class="event-filter-btn" data-event="xama">XAMA Live House</button>
            <button class="event-filter-btn" data-event="sakuracon">Sakuracon</button>
            <button class="event-filter-btn" data-event="convention">Convention</button>
            <button class="event-filter-btn" data-event="live">Live Event</button>
          </div>
        </div>
      </div>

      <!-- Dynamic Event Sections -->
      <div id="eventsContainer"></div>


    <!-- Footer -->
    <footer>
      Follow us on Instagram / Xiaohongshu / YouTube
    </footer>

    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal">
      <span class="close">&times;</span>
      <img id="modalImage" src="" alt="Zoomed Image">
    </div>

    <script>
      const API_URL = 'https://doll-trap-github-io.onrender.com/api';
      
      // Load photos and events from API
      async function loadGallery() {
        try {
          console.log('Loading gallery...');
          const photosResponse = await fetch(`${API_URL}/photos`);
          const photos = await photosResponse.json();
          console.log('Photos from API:', photos);
          const eventsResponse = await fetch(`${API_URL}/events`);
          const events = await eventsResponse.json();
          console.log('Events from API:', events);
          
          // Create event map and group photos by event
          const eventMap = {};
          const groupedPhotos = {};
          
          events.forEach(event => {
            eventMap[event.id] = event;
            groupedPhotos[event.id] = [];
          });
          
          // Group photos by event and category
          const photosByCategory = {
            'Performance': [],
            'Rehearsal': [],
            'Photoshoot': [],
            'Visuals': [],
            'Behind the Scenes': [],
            'Event': [],
            'Other': []
          };
          
          photos.forEach(photo => {
            console.log('Processing photo:', photo.id, 'category:', photo.category, 'event_id:', photo.event_id);
            if (photo.event_id && groupedPhotos[photo.event_id]) {
              // Photo belongs to an event
              groupedPhotos[photo.event_id].push(photo);
            } else {
              // Photo doesn't belong to an event - group by category
              const category = photo.category || 'Other';
              console.log('Photo', photo.id, 'assigned to category:', category);
              if (photosByCategory[category]) {
                photosByCategory[category].push(photo);
              } else {
                console.log('Category not found, adding to Other:', category);
                photosByCategory['Other'].push(photo);
              }
            }
          });
          console.log('Grouped photos by event:', groupedPhotos);
          console.log('Grouped photos by category:', photosByCategory);
          
          // Generate HTML for sections
          const container = document.getElementById('eventsContainer');
          let html = '';
          
          // First, show category sections (photos without events)
          Object.keys(photosByCategory).forEach(category => {
            const categoryPhotos = photosByCategory[category];
            if (categoryPhotos.length === 0) return;
            
            html += `
              <div class="gallery-event" data-category="${category.toLowerCase().replace(/ /g, '-')}" data-event="none">
                <h2 class="event-title">${category}</h2>
                <p style="color: #999; margin-bottom: 15px;">Standalone photos in this category</p>
                <div class="gallery-grid">
            `;
            
            categoryPhotos.forEach(photo => {
              const memberTag = photo.member_tag || 'Group';
              const photoUrl = photo.photo_url.startsWith('http') 
                ? photo.photo_url 
                : `https://doll-trap-github-io.onrender.com${photo.photo_url}`;
              html += `
                  <div class="gallery-item" data-member="${memberTag.toLowerCase()}" data-photo-category="${category.toLowerCase().replace(/ /g, '-')}">
                    <img src="${photoUrl}" alt="${photo.caption || 'Photo'}" title="${photo.caption || ''}">
                    <p class="photo-member">${memberTag}</p>
                  </div>
              `;
            });
            
            html += `
                </div>
              </div>
            `;
          });
          
          // Then, show event sections (photos with events)
          events.forEach(event => {
            const eventPhotos = groupedPhotos[event.id];
            if (eventPhotos.length === 0) return;
            console.log(`Event ${event.id}: ${event.title} has ${eventPhotos.length} photos`);
            
            // Determine the dominant category from this event's photos
            const eventPhotoCategories = eventPhotos.map(p => (p.category || 'Performance').toLowerCase().replace(/ /g, '-'));
            const dominantCategory = eventPhotoCategories[0] || 'performance';

            html += `
              <div class="gallery-event" data-category="${dominantCategory}" data-event="${event.id}">
                <h2 class="event-title">${event.title}</h2>
                <p style="color: #999; margin-bottom: 15px;">Category: <span style="color: #ec4899; font-weight: bold;">${event.category || 'Event'}</span></p>
                <div class="gallery-grid">
            `;
            
            eventPhotos.forEach(photo => {
              const memberTag = photo.member_tag || 'Group';
              const photoCategory = photo.category || 'Performance';
              // Handle both Supabase URLs and local paths
              const photoUrl = photo.photo_url.startsWith('http') 
                ? photo.photo_url 
                : `https://doll-trap-github-io.onrender.com${photo.photo_url}`;
              html += `
                  <div class="gallery-item" data-member="${memberTag.toLowerCase()}" data-photo-category="${photoCategory.toLowerCase().replace(/ /g, '-')}">
                    <img src="${photoUrl}" alt="${photo.caption || 'Photo'}" title="${photo.caption || ''}">
                    <p class="photo-member">${memberTag}</p>
                  </div>
              `;
            });
            
            html += `
                </div>
              </div>
            `;
          });
          
          if (html === '') {
            html = '<p style="text-align: center; color: #999; grid-column: 1/-1;">No photos uploaded yet</p>';
          }
          
          console.log('Rendering gallery HTML:', html.length, 'characters');
          container.innerHTML = html;
          console.log('Gallery rendered successfully');
          
          // Reattach event listeners
          setupImageModal();
          setupFilters();
        } catch (error) {
          console.error('Error loading gallery:', error);
          document.getElementById('eventsContainer').innerHTML = '<p style="color: #999;">Error loading photos</p>';
        }
      }
      
      function setupImageModal() {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close');
        const galleryImages = document.querySelectorAll('.gallery-item img');

        galleryImages.forEach(img => {
          img.addEventListener('click', () => {
            modal.style.display = 'block';
            modalImg.src = img.src;
          });
        });

        closeBtn.addEventListener('click', () => {
          modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.style.display = 'none';
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            modal.style.display = 'none';
          }
        });
      }
      
      function setupFilters() {
        let activeCategory = 'all';
        let activeMember = 'all';
        let activeEvent = 'all';

        const galleryEvents = document.querySelectorAll('.gallery-event');
        const categoryBtns = document.querySelectorAll('.filter-btn');
        const memberBtns = document.querySelectorAll('.member-filter-btn');
        const eventBtns = document.querySelectorAll('.event-filter-btn');

        // Category filter
        categoryBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            categoryBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.getAttribute('data-filter');
            applyFilters();
          });
        });

        // Member filter
        memberBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            memberBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeMember = btn.getAttribute('data-member');
            applyFilters();
          });
        });

        // Event filter
        eventBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            eventBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeEvent = btn.getAttribute('data-event');
            applyFilters();
          });
        });

        // Apply all filters
        function applyFilters() {
          const allSections = document.querySelectorAll('.gallery-event');
          
          allSections.forEach(section => {
            const sectionCategory = section.getAttribute('data-category');
            const sectionEvent = section.getAttribute('data-event');
            let showSection = true;

            // Check event filter (only applies to event sections)
            if (activeEvent !== 'all' && sectionEvent !== 'none') {
              if (sectionEvent !== activeEvent) {
                showSection = false;
              }
            }

            // If section should be shown, filter items within it
            if (showSection) {
              const items = section.querySelectorAll('.gallery-item');
              let visibleItems = 0;
              
              items.forEach(item => {
                let showItem = true;
                
                // Check category filter (applies to photo category)
                if (activeCategory !== 'all') {
                  const itemCategory = item.getAttribute('data-photo-category');
                  if (itemCategory !== activeCategory) {
                    showItem = false;
                  }
                }
                
                // Check member filter
                if (activeMember !== 'all') {
                  const itemMember = item.getAttribute('data-member');
                  if (itemMember !== activeMember && itemMember !== 'group') {
                    showItem = false;
                  }
                }
                
                item.style.display = showItem ? 'block' : 'none';
                if (showItem) visibleItems++;
              });
              
              // Hide section if no photos are visible after filtering
              section.style.display = visibleItems > 0 ? 'block' : 'none';
            } else {
              section.style.display = 'none';
            }
          });
        }
      }
      
      // Load gallery on page load
      loadGallery();
    </script>
  </body>
</html>
