<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doll Trap - Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
  </head>

  <body>
    <!-- Navigation -->
    <div class="navbar">
      <h1>🎀 Doll Trap Admin</h1>
      <div class="navbar-actions">
        <a href="index.html" class="navbar-home-link">← Back to Home</a>
        <button id="logoutBtn" class="hidden">Logout</button>
      </div>
    </div>

    <div class="container">
      <!-- Login Form -->
      <div id="loginForm" class="login-form">
        <h2>Admin Login</h2>
        <form id="authForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit">Login</button>
        </form>
        <p id="authError" class="alert error hidden" style="margin-top: 10px;"></p>
      </div>

      <!-- Dashboard (hidden until logged in) -->
      <div id="dashboard" class="hidden">
        <div class="admin-layout">

          <!-- Sidebar -->
          <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开菜单">☰</button>
            <nav class="sidebar-nav">
              <button class="sidebar-nav-btn active" onclick="switchSection('events', this)">
                <span class="sidebar-icon">📅</span>
                <span class="sidebar-label">Events</span>
              </button>
              <button class="sidebar-nav-btn" onclick="switchSection('photos', this)">
                <span class="sidebar-icon">📸</span>
                <span class="sidebar-label">Photos</span>
              </button>

              <!-- Bottom actions -->
              <div class="sidebar-divider"></div>
              <button class="sidebar-nav-btn" id="accountSettingsBtn" onclick="document.getElementById('accountSettingsModal').classList.add('active')">
                <span class="sidebar-icon">⚙️</span>
                <span class="sidebar-label">Account</span>
              </button>
              <button class="sidebar-nav-btn sidebar-nav-logout" id="sidebarLogoutBtn">
                <span class="sidebar-icon">🚪</span>
                <span class="sidebar-label">Logout</span>
              </button>
            </nav>
          </div>

          <!-- Main Content -->
          <div class="main-content">

        <!-- Events Section -->
        <div id="eventsSection" class="admin-section active">
          <div class="dashboard">
            <!-- Create Event Panel -->
            <div class="panel" id="createEventPanel">
              <div class="panel-header" onclick="togglePanel(this.parentElement)">
                <h2>📅 Create Event</h2>
                <span class="panel-toggle-icon">▼</span>
              </div>
              <div class="panel-body">
              <form id="eventForm">
                <div class="form-group">
                  <label>Type</label>
                  <select id="eventKind" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="event">Event</option>
                    <option value="album">Album</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Event Title <span style="color:#ef4444;">*</span></label>
                  <input type="text" id="eventTitle" required>
                </div>
                <div class="form-group">
                  <label>Description</label>
                  <textarea id="eventDescription" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text); resize: vertical;" rows="3"></textarea>
                </div>
                <div class="form-group" id="eventCategoryGroup">
                  <label>Category</label>
                  <select id="eventCategory" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="Live">Live</option>
                    <option value="Performance">Performance</option>
                    <option value="Community Event">Community Event</option>
                    <option value="Convention">Convention</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Collaboration">Collaboration</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-group" id="eventDateGroup">
                  <label>Date <span style="color:#ef4444;">*</span> <span id="eventDateHint" style="color: #94a3b8;">(required for events)</span></label>
                  <input type="date" id="eventDate">
                </div>
                <div class="form-group" id="eventTimeGroup">
                  <label>Start Time</label>
                  <input type="time" id="eventTime">
                </div>
                <div class="form-group" id="eventEndTimeGroup">
                  <label>End Time</label>
                  <input type="time" id="eventEndTime">
                </div>
                <div class="form-group">
                  <label>Location</label>
                  <input type="text" id="eventLocation">
                </div>
                <div class="form-group">
                  <label>Event Poster</label>
                  <div style="display:flex; flex-direction:column; gap:8px;">
                    <div class="upload-area" id="posterUploadArea" style="padding: 14px; text-align:center; cursor:pointer;" onclick="document.getElementById('posterFileInput').click()">
                      <p style="margin:0; font-size:13px; color:#94a3b8;">📤 Click to upload poster image</p>
                      <input type="file" id="posterFileInput" accept="image/*" style="display:none;">
                    </div>
                    <div id="posterPreviewWrap" style="display:none; position:relative;">
                      <img id="posterPreview" src="" alt="Poster Preview" style="width:100%; max-height:200px; object-fit:cover; border-radius:8px;">
                      <button type="button" onclick="clearPosterUpload()" style="position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.55); color:white; border:none; border-radius:50%; width:26px; height:26px; cursor:pointer; font-size:14px; line-height:1;">&times;</button>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                      <div style="flex:1; height:1px; background:var(--border);"></div>
                      <span style="color:#94a3b8; font-size:12px;">or paste URL</span>
                      <div style="flex:1; height:1px; background:var(--border);"></div>
                    </div>
                    <input type="text" id="eventImage" placeholder="https://..." oninput="onPosterUrlInput()">
                  </div>
                </div>
                <button type="submit" id="eventSubmitBtn">Create Event</button>
                <button type="button" id="eventCancelEditBtn" class="hidden" style="margin-top: 10px; background: #94a3b8;">Cancel Edit</button>
              </form>
              <p id="eventMessage" class="alert success hidden" style="margin-top: 10px;"></p>
              </div><!-- /panel-body -->
            </div>

            <!-- All Events Panel -->
            <div class="panel">
              <h2>📋 All Events</h2>
              <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="filterAll" class="filter-btn active" onclick="filterEvents('all')" style="padding: 8px 16px; border: none; background: var(--blue); color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">All</button>
                <button id="filterUpcoming" class="filter-btn" onclick="filterEvents('upcoming')" style="padding: 8px 16px; border: none; background: #94a3b8; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Upcoming</button>
                <button id="filterPast" class="filter-btn" onclick="filterEvents('past')" style="padding: 8px 16px; border: none; background: #94a3b8; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Past</button>
              </div>
              <div id="allEventsList" class="list-items" style="max-height: 600px; overflow-y: auto;"></div>
            </div>
          </div>
        </div>

        <!-- Photos Section -->
        <div id="photosSection" class="admin-section">
          <div class="photos-panel">
            <!-- Upload Panel -->
            <div class="panel" id="uploadPhotosPanel">
              <div class="panel-header" onclick="togglePanel(this.parentElement)">
                <h2>📸 Upload Photos</h2>
                <span class="panel-toggle-icon">▼</span>
              </div>
              <div class="panel-body">
              <form id="photoForm">
                <div class="form-group">
                  <label>Event / Album</label>
                  <select id="photoEvent" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="">No Event/Album</option>
                  </select>
                  <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="text" id="newFolderName" placeholder="Create new album (no date needed)" style="flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <button type="button" id="createFolderBtn" style="white-space: nowrap; padding: 10px 14px;">Create Album</button>
                  </div>
                </div>
                <div class="form-group">
                  <label>Member Tag</label>
                  <select id="photoMember" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="">All Members</option>
                    <option value="Buzzly">Buzzly</option>
                    <option value="Kokona">Kokona</option>
                    <option value="Hitomi">Hitomi</option>
                    <option value="Group">Group</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Caption</label>
                  <input type="text" id="photoCaption" placeholder="Photo description">
                </div>
                <div class="upload-area" id="uploadArea">
                  <p>📤 Click or drag multiple photos here <span style="color:#ef4444;">*</span></p>
                  <input type="file" id="photoInput" multiple accept="image/*">
                </div>
                <button type="submit" id="uploadPhotosBtn" style="margin-top: 15px;">Upload Photos</button>
              </form>
              <p id="photoMessage" class="alert success hidden" style="margin-top: 10px;"></p>
              </div><!-- /panel-body -->
            </div>

            <!-- Photos Gallery Panel -->
            <div class="panel">
              <h2>🖼️ Photo Library</h2>
              <div class="photo-tabs" id="photoEventTabs"></div>
              <div class="photos-grid" id="photosGrid"></div>
            </div>
          </div>
        </div>
          </div><!-- /main-content -->
        </div><!-- /admin-layout -->
      </div>

      <!-- Edit Photo Modal -->
      <div id="editPhotoModal" class="edit-modal">
        <div class="edit-modal-content">
          <div class="edit-modal-header">
            <h2>Edit Photo</h2>
            <button class="edit-modal-close" onclick="closeEditPhotoModal()">&times;</button>
          </div>
          <form id="editPhotoForm">
            <div class="form-group">
              <label>Caption</label>
              <input type="text" id="editPhotoCaption">
            </div>
            <div class="form-group">
              <label>Member Tag</label>
              <select id="editPhotoMember" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                <option value="Group">Group</option>
                <option value="Buzzly">Buzzly</option>
                <option value="Kokona">Kokona</option>
                <option value="Hitomi">Hitomi</option>
              </select>
            </div>
            <div class="form-group">
              <label>Event / Album</label>
              <select id="editPhotoEvent" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                <option value="">No Event/Album</option>
              </select>
            </div>
            <div style="display: flex; gap: 10px;">
              <button type="submit" style="flex: 1;">Save Changes</button>
              <button type="button" onclick="closeEditPhotoModal()" style="flex: 1; background: #94a3b8;">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div id="accountSettingsModal" class="edit-modal">
        <div class="edit-modal-content">
          <div class="edit-modal-header">
            <h2>Account Settings</h2>
            <button class="edit-modal-close" type="button" onclick="closeAccountSettingsModal()">&times;</button>
          </div>
          <form id="changePasswordForm" class="account-form">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" id="currentPassword" required>
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPassword" minlength="8" required>
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="confirmNewPassword" minlength="8" required>
            </div>
            <button type="submit">Update Password</button>
          </form>
          <p id="passwordMessage" class="alert success hidden" style="margin-top: 10px;"></p>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
