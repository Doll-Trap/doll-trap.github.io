<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doll Trap - Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
  </head>

  <body>
    <!-- Navigation -->
    <div class="navbar">
      <h1>🎀 Doll Trap Admin</h1>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>

    <div class="container">
      <!-- Login Form -->
      <div id="loginForm" class="login-form">
        <h2>Admin Login</h2>
        <form id="authForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit">Login</button>
        </form>
        <p id="authError" class="alert error hidden" style="margin-top: 10px;"></p>
      </div>

      <!-- Dashboard (hidden until logged in) -->
      <div id="dashboard" class="hidden">
        <!-- Navigation between Events and Photos -->
        <div class="admin-nav">
          <button class="admin-nav-btn active" onclick="switchSection('events')">📅 Events</button>
          <button class="admin-nav-btn" onclick="switchSection('photos')">📸 Photos</button>
        </div>

        <!-- Events Section -->
        <div id="eventsSection" class="admin-section active">
          <div class="dashboard">
            <!-- Create Event Panel -->
            <div class="panel">
              <h2>📅 Create Event</h2>
              <form id="eventForm">
                <div class="form-group">
                  <label>Event Title</label>
                  <input type="text" id="eventTitle" required>
                </div>
                <div class="form-group">
                  <label>Description</label>
                  <textarea id="eventDescription" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text); resize: vertical;" rows="3"></textarea>
                </div>
                <div class="form-group">
                  <label>Category</label>
                  <select id="eventCategory" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="Live">Live</option>
                    <option value="Community Event">Community Event</option>
                    <option value="Convention">Convention</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Collaboration">Collaboration</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Date <span style="color: #ec4899;">*</span></label>
                  <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                  <label>Time <span style="color: #94a3b8;">(optional)</span></label>
                  <input type="time" id="eventTime">
                </div>
                <div class="form-group">
                  <label>Location</label>
                  <input type="text" id="eventLocation">
                </div>
                <div class="form-group">
                  <label>Image URL</label>
                  <input type="text" id="eventImage" placeholder="https://...">
                </div>
                <button type="submit" id="eventSubmitBtn">Create Event</button>
                <button type="button" id="eventCancelEditBtn" class="hidden" style="margin-top: 10px; background: #94a3b8;">Cancel Edit</button>
              </form>
              <p id="eventMessage" class="alert success hidden" style="margin-top: 10px;"></p>
            </div>

            <!-- All Events Panel -->
            <div class="panel">
              <h2>📋 All Events</h2>
              <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="filterAll" class="filter-btn active" onclick="filterEvents('all')" style="padding: 8px 16px; border: none; background: var(--blue); color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">All</button>
                <button id="filterUpcoming" class="filter-btn" onclick="filterEvents('upcoming')" style="padding: 8px 16px; border: none; background: #94a3b8; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Upcoming</button>
                <button id="filterPast" class="filter-btn" onclick="filterEvents('past')" style="padding: 8px 16px; border: none; background: #94a3b8; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Past</button>
              </div>
              <div id="allEventsList" class="list-items" style="max-height: 600px; overflow-y: auto;"></div>
            </div>
          </div>
        </div>

        <!-- Photos Section -->
        <div id="photosSection" class="admin-section">
          <div class="photos-panel">
            <!-- Upload Panel -->
            <div class="panel">
              <h2>📸 Upload Photos</h2>
              <form id="photoForm">
                <div class="form-group">
                  <label>Event Folder (Optional)</label>
                  <select id="photoEvent" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="">No Event</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Custom Folder (Optional)</label>
                  <select id="photoFolder" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="">No Custom Folder</option>
                  </select>
                  <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="text" id="newFolderName" placeholder="Create new folder" style="flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <button type="button" id="createFolderBtn" style="white-space: nowrap; padding: 10px 14px;">Create</button>
                  </div>
                </div>
                <div class="form-group">
                  <label>Member Tag</label>
                  <select id="photoMember" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                    <option value="">All Members</option>
                    <option value="Buzzly">Buzzly</option>
                    <option value="Kokona">Kokona</option>
                    <option value="Hitomi">Hitomi</option>
                    <option value="Group">Group</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Caption</label>
                  <input type="text" id="photoCaption" placeholder="Photo description">
                </div>
                <div class="upload-area" id="uploadArea">
                  <p>📤 Click or drag multiple photos here</p>
                  <input type="file" id="photoInput" multiple accept="image/*">
                </div>
                <button type="submit" style="margin-top: 15px;">Upload Photos</button>
              </form>
              <p id="photoMessage" class="alert success hidden" style="margin-top: 10px;"></p>
            </div>

            <!-- Photos Gallery Panel -->
            <div class="panel">
              <h2>🖼️ Photo Library</h2>
              <div class="photo-tabs" id="photoEventTabs"></div>
              <div class="photos-grid" id="photosGrid"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Photo Modal -->
      <div id="editPhotoModal" class="edit-modal">
        <div class="edit-modal-content">
          <div class="edit-modal-header">
            <h2>Edit Photo</h2>
            <button class="edit-modal-close" onclick="closeEditPhotoModal()">&times;</button>
          </div>
          <form id="editPhotoForm">
            <div class="form-group">
              <label>Caption</label>
              <input type="text" id="editPhotoCaption">
            </div>
            <div class="form-group">
              <label>Member Tag</label>
              <select id="editPhotoMember" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                <option value="Group">Group</option>
                <option value="Buzzly">Buzzly</option>
                <option value="Kokona">Kokona</option>
                <option value="Hitomi">Hitomi</option>
              </select>
            </div>
            <div class="form-group">
              <label>Event Folder</label>
              <select id="editPhotoEvent" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                <option value="">No Event</option>
              </select>
            </div>
            <div class="form-group">
              <label>Custom Folder</label>
              <select id="editPhotoFolder" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg-dark); color: var(--text);">
                <option value="">No Custom Folder</option>
              </select>
            </div>
            <div style="display: flex; gap: 10px;">
              <button type="submit" style="flex: 1;">Save Changes</button>
              <button type="button" onclick="closeEditPhotoModal()" style="flex: 1; background: #94a3b8;">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const API_URL = 'https://doll-trap-github-io.onrender.com/api';
      const API_ORIGIN = API_URL.replace('/api', '');
      let authToken = localStorage.getItem('authToken');

      // Check if already logged in
      if (authToken) {
        // Verify token is still valid by making a test request
        verifyToken();
      }
      
      // Verify token validity
      async function verifyToken() {
        try {
          const response = await fetch(`${API_URL}/auth/verify`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          });

          if (response.status === 401) {
            localStorage.removeItem('authToken');
            authToken = null;
            return;
          }

          if (response.ok) {
            showDashboard();
          }
        } catch (error) {
          console.error('Token verification error:', error);
        }
      }

      // Login
      document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
          const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();

          if (!response.ok) throw new Error(data.error);

          authToken = data.token;
          localStorage.setItem('authToken', authToken);
          showDashboard();
        } catch (error) {
          showMessage('authError', error.message, 'error');
        }
      });

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('authToken');
        authToken = null;
        location.reload();
      });

      // Create Event
      document.getElementById('eventForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const isEditing = editingEventId !== null;
        
        const dateValue = document.getElementById('eventDate').value;
        const timeValue = document.getElementById('eventTime').value;
        
        // Combine date and time, or use just date with 00:00:00 if time is empty
        let dateString = dateValue;
        if (timeValue) {
          dateString = `${dateValue}T${timeValue}`;
        } else {
          dateString = `${dateValue}T00:00:00`;
        }
        
        const event = {
          title: document.getElementById('eventTitle').value,
          description: document.getElementById('eventDescription').value,
          date: new Date(dateString).toISOString(),
          location: document.getElementById('eventLocation').value,
          image_url: document.getElementById('eventImage').value,
          category: document.getElementById('eventCategory').value
        };

        try {
          const response = await fetch(isEditing ? `${API_URL}/events/${editingEventId}` : `${API_URL}/events`, {
            method: isEditing ? 'PUT' : 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify(event)
          });

          if (response.status === 401) {
            localStorage.removeItem('authToken');
            authToken = null;
            throw new Error('Session expired. Please login again.');
          }

          if (!response.ok) {
            const errorMessage = await parseApiError(
              response,
              isEditing ? 'Failed to update event' : 'Failed to create event'
            );
            throw new Error(errorMessage);
          }

          showMessage('eventMessage', isEditing ? 'Event updated!' : 'Event created!', 'success');
          resetEventFormMode();
          loadEvents();
        } catch (error) {
          showMessage('eventMessage', error.message, 'error');
        }
      });

      document.getElementById('eventCancelEditBtn').addEventListener('click', () => {
        resetEventFormMode();
      });

      // Upload Photos
      document.getElementById('photoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const files = document.getElementById('photoInput').files;

        if (files.length === 0) {
          showMessage('photoMessage', 'Please select photos', 'error');
          return;
        }

        const eventId = document.getElementById('photoEvent').value;
        const folderId = document.getElementById('photoFolder').value;

        for (let file of files) {
          const formData = new FormData();
          formData.append('photo', file);

          if (eventId) {
            formData.append('event_id', eventId);
          } else if (folderId) {
            formData.append('folder_id', folderId);
          }
          
          const memberTag = document.getElementById('photoMember').value;
          formData.append('member_tag', memberTag || 'Group');
          
          const caption = document.getElementById('photoCaption').value;
          if (caption) formData.append('caption', caption);

          try {
            const response = await fetch(`${API_URL}/photos`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${authToken}` },
              body: formData
            });

            if (response.status === 401) {
              throw new Error('Session expired. Please login again.');
            }
            
            if (!response.ok) {
              const errorMessage = await parseApiError(response, 'Upload failed');
              throw new Error(errorMessage);
            }

            const result = await response.json();
            console.log('Photo uploaded successfully:', result);
          } catch (error) {
            showMessage('photoMessage', error.message, 'error');
            if (error.message.includes('Session expired')) {
              localStorage.removeItem('authToken');
              authToken = null;
              setTimeout(() => location.reload(), 2000);
            }
            return;
          }
        }

        showMessage('photoMessage', `${files.length} photo(s) uploaded!`, 'success');
        document.getElementById('photoForm').reset();
        await loadPhotos(); // Wait for photos to reload
      });

      // Event and custom folder are mutually exclusive for uploads
      document.getElementById('photoEvent').addEventListener('change', (e) => {
        if (e.target.value) {
          document.getElementById('photoFolder').value = '';
        }
      });

      document.getElementById('photoFolder').addEventListener('change', (e) => {
        if (e.target.value) {
          document.getElementById('photoEvent').value = '';
        }
      });

      // Event and custom folder are mutually exclusive for edits
      document.getElementById('editPhotoEvent').addEventListener('change', (e) => {
        if (e.target.value) {
          document.getElementById('editPhotoFolder').value = '';
        }
      });

      document.getElementById('editPhotoFolder').addEventListener('change', (e) => {
        if (e.target.value) {
          document.getElementById('editPhotoEvent').value = '';
        }
      });

      // Create a new custom folder
      document.getElementById('createFolderBtn').addEventListener('click', async () => {
        const input = document.getElementById('newFolderName');
        const name = input.value.trim();

        if (!name) {
          showMessage('photoMessage', 'Please enter a folder name', 'error');
          return;
        }

        try {
          const response = await fetch(`${API_URL}/photo-folders`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify({ name })
          });

          if (response.status === 401) {
            localStorage.removeItem('authToken');
            authToken = null;
            throw new Error('Session expired. Please login again.');
          }

          if (!response.ok) {
            const errorMessage = await parseApiError(response, 'Failed to create folder');
            throw new Error(errorMessage);
          }

          const folder = await response.json();
          input.value = '';
          await loadPhotoFolders();
          document.getElementById('photoFolder').value = folder.id;
          document.getElementById('photoEvent').value = '';
          showMessage('photoMessage', `Folder "${folder.name}" created`, 'success');
        } catch (error) {
          showMessage('photoMessage', error.message, 'error');
        }
      });

      // Drag and drop
      const uploadArea = document.getElementById('uploadArea');
      const photoInput = document.getElementById('photoInput');
      
      // File selection feedback
      photoInput.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length > 0) {
          const fileNames = Array.from(files).map(f => f.name).join(', ');
          let fileInfo = document.getElementById('fileInfo');
          if (!fileInfo) {
            fileInfo = document.createElement('div');
            fileInfo.id = 'fileInfo';
            uploadArea.appendChild(fileInfo);
          }
          fileInfo.innerHTML = `
            <p style="color: #4ade80; font-weight: bold; margin-bottom: 10px;">✅ ${files.length} file(s) selected:</p>
            <p style="font-size: 12px; color: #94a3b8; margin: 5px 0;">${fileNames}</p>
          `;
        }
      });
      
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.background = 'rgba(217, 70, 166, 0.2)';
      });

      uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.background = '';
      });

      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        document.getElementById('photoInput').files = e.dataTransfer.files;
        uploadArea.style.background = '';
        
        // Show feedback
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          const fileNames = Array.from(files).map(f => f.name).join(', ');
          uploadArea.innerHTML = `
            <p>✅ ${files.length} file(s) selected:</p>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">${fileNames}</p>
            <input type="file" id="photoInput" multiple accept="image/*">
          `;
        }
      });

      uploadArea.addEventListener('click', () => {
        document.getElementById('photoInput').click();
      });

      let allEventsData = []; // Store all events for filtering
      let allPhotosData = []; // Store all photos
      let allFoldersData = []; // Store all custom folders
      let currentPhotoEventFilter = 'all'; // Current photo filter
      let editingPhotoId = null; // Current photo being edited
      let editingEventId = null; // Current event being edited

      async function parseApiError(response, fallbackMessage) {
        const contentType = response.headers.get('content-type') || '';

        try {
          if (contentType.includes('application/json')) {
            const data = await response.json();
            return data.error || data.message || fallbackMessage;
          }

          const rawText = await response.text();
          if (!rawText) return fallbackMessage;

          const cleanedText = rawText
            .replace(/<[^>]*>/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

          return cleanedText ? `${fallbackMessage}: ${cleanedText.slice(0, 140)}` : fallbackMessage;
        } catch (_) {
          return fallbackMessage;
        }
      }

      function resetEventFormMode() {
        editingEventId = null;
        document.getElementById('eventForm').reset();
        document.getElementById('eventSubmitBtn').textContent = 'Create Event';
        document.getElementById('eventCancelEditBtn').classList.add('hidden');
      }

      // Switch between Events and Photos sections
      function switchSection(section) {
        // Hide all sections
        document.getElementById('eventsSection').classList.remove('active');
        document.getElementById('photosSection').classList.remove('active');
        
        // Remove active class from all buttons
        document.querySelectorAll('.admin-nav-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        
        // Show selected section
        if (section === 'events') {
          document.getElementById('eventsSection').classList.add('active');
          document.querySelectorAll('.admin-nav-btn')[0].classList.add('active');
        } else {
          document.getElementById('photosSection').classList.add('active');
          document.querySelectorAll('.admin-nav-btn')[1].classList.add('active');
        }
      }

      // Load events
      async function loadEvents() {
        try {
          const response = await fetch(`${API_URL}/events`);
          const events = await response.json();
          allEventsData = events; // Store for filtering

          // Update upload event select dropdown
          const select = document.getElementById('photoEvent');
          const currentValue = select.value;
          select.innerHTML = '<option value="">No Event</option>';
          events.forEach(event => {
            select.innerHTML += `<option value="${event.id}">${event.title}</option>`;
          });
          select.value = currentValue;

          // Update edit event select dropdown
          const editEventSelect = document.getElementById('editPhotoEvent');
          const currentEditEventValue = editEventSelect.value;
          editEventSelect.innerHTML = '<option value="">No Event</option>';
          events.forEach(event => {
            editEventSelect.innerHTML += `<option value="${event.id}">${event.title}</option>`;
          });
          editEventSelect.value = currentEditEventValue;

          // Display all events in "All Events" panel with filter
          filterEvents('all');
          await loadPhotoFolders();
          await loadPhotos();
        } catch (error) {
          console.error('Error loading events:', error);
        }
      }

      async function loadPhotoFolders() {
        try {
          const response = await fetch(`${API_URL}/photo-folders`);
          const folders = await response.json();
          allFoldersData = Array.isArray(folders) ? folders : [];

          const uploadFolderSelect = document.getElementById('photoFolder');
          const currentUploadValue = uploadFolderSelect.value;
          uploadFolderSelect.innerHTML = '<option value="">No Custom Folder</option>';
          allFoldersData.forEach(folder => {
            uploadFolderSelect.innerHTML += `<option value="${folder.id}">${folder.name}</option>`;
          });
          uploadFolderSelect.value = currentUploadValue;

          const editFolderSelect = document.getElementById('editPhotoFolder');
          const currentEditValue = editFolderSelect.value;
          editFolderSelect.innerHTML = '<option value="">No Custom Folder</option>';
          allFoldersData.forEach(folder => {
            editFolderSelect.innerHTML += `<option value="${folder.id}">${folder.name}</option>`;
          });
          editFolderSelect.value = currentEditValue;
        } catch (error) {
          console.error('Error loading folders:', error);
        }
      }

      // Filter events
      function filterEvents(type) {
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        let filteredEvents = allEventsData;

        if (type === 'upcoming') {
          filteredEvents = allEventsData.filter(event => {
            if (!event.date) return false; // Exclude TBD events
            const eventDate = new Date(event.date);
            eventDate.setHours(0, 0, 0, 0);
            return eventDate >= now;
          });
        } else if (type === 'past') {
          filteredEvents = allEventsData.filter(event => {
            if (!event.date) return false; // Exclude TBD events
            const eventDate = new Date(event.date);
            eventDate.setHours(0, 0, 0, 0);
            return eventDate < now;
          });
        }

        // Update filter button styles
        document.getElementById('filterAll').style.background = type === 'all' ? 'var(--blue)' : '#94a3b8';
        document.getElementById('filterUpcoming').style.background = type === 'upcoming' ? 'var(--blue)' : '#94a3b8';
        document.getElementById('filterPast').style.background = type === 'past' ? 'var(--blue)' : '#94a3b8';

        // Display filtered events
        const allList = document.getElementById('allEventsList');
        if (filteredEvents.length === 0) {
          allList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No events</p>';
        } else {
          allList.innerHTML = filteredEvents.map(event => {
            const eventDate = event.date ? new Date(event.date) : null;
            const isPast = eventDate && eventDate < now;
            
            return `
              <div class="list-item">
                <div class="list-item-info">
                  <h4>${event.title}</h4>
                  <p style="margin: 5px 0;">${event.date ? new Date(event.date).toLocaleString() : '<strong>TBD</strong>'}</p>
                  ${event.location ? `<p style="margin: 5px 0; font-size: 11px; color: #94a3b8;">📍 ${event.location}</p>` : ''}
                  <p style="font-size: 11px; color: #64748b; margin-top: 8px;">${event.description || 'No description'}</p>
                  ${isPast ? '<p style="font-size: 10px; color: #ef4444; margin-top: 5px;"><strong>PAST EVENT</strong></p>' : ''}
                </div>
                <div style="display: flex; gap: 5px; flex-direction: column;">
                  <button onclick="editEvent(${event.id})" style="background: var(--blue); border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; white-space: nowrap;">Edit</button>
                  <button onclick="deleteEvent(${event.id})" style="background: #ef4444; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; white-space: nowrap;">Delete</button>
                </div>
              </div>
            `;
          }).join('');
        }
      }

      // Load photos
      async function loadPhotos() {
        try {
          console.log('Loading photos...');
          const response = await fetch(`${API_URL}/photos`);
          const photos = await response.json();
          console.log('Photos loaded:', photos);
          allPhotosData = photos;

          // Create event map
          const eventMap = {};
          allEventsData.forEach(event => {
            eventMap[event.id] = event;
          });

          // Build folder-level tabs (events + custom folders)
          const tabsContainer = document.getElementById('photoEventTabs');
          tabsContainer.innerHTML = '<button class="photo-tab-btn active" onclick="filterPhotosByEvent(\'all\')">All Folders</button>';

          allEventsData.forEach(event => {
            const eventPhotos = photos.filter(p => String(p.event_id) === String(event.id));
            if (eventPhotos.length > 0) {
              tabsContainer.innerHTML += `<button class="photo-tab-btn" onclick="filterPhotosByEvent('event-${event.id}')">📅 ${event.title} (${eventPhotos.length})</button>`;
            }
          });

          allFoldersData.forEach(folder => {
            const folderPhotos = photos.filter(p => String(p.folder_id) === String(folder.id));
            if (folderPhotos.length > 0) {
              tabsContainer.innerHTML += `<button class="photo-tab-btn" onclick="filterPhotosByEvent('folder-${folder.id}')">📁 ${folder.name} (${folderPhotos.length})</button>`;
            }
          });

          // Display photos
          console.log('Displaying photos...');
          displayPhotos(photos);
        } catch (error) {
          console.error('Error loading photos:', error);
        }
      }

      // Filter photos by folder key
      function filterPhotosByEvent(folderKey) {
        currentPhotoEventFilter = folderKey;

        // Update active tab
        document.querySelectorAll('.photo-tab-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        event.target.classList.add('active');

        // Filter and display
        let filteredPhotos = allPhotosData;
        if (folderKey !== 'all') {
          if (String(folderKey).startsWith('event-')) {
            const eventId = String(folderKey).replace('event-', '');
            filteredPhotos = allPhotosData.filter(p => String(p.event_id) === eventId);
          } else if (String(folderKey).startsWith('folder-')) {
            const folderId = String(folderKey).replace('folder-', '');
            filteredPhotos = allPhotosData.filter(p => String(p.folder_id) === folderId);
          }
        }
        displayPhotos(filteredPhotos);
      }

      // Display photos in grid
      function displayPhotos(photos) {
        const grid = document.getElementById('photosGrid');
        
        if (photos.length === 0) {
          grid.innerHTML = '<p style="text-align: center; color: #999; grid-column: 1/-1; padding: 20px;">No photos</p>';
          return;
        }

        // Create event map
        const eventMap = {};
        allEventsData.forEach(event => {
          eventMap[event.id] = event.title;
        });

        grid.innerHTML = photos.map(photo => {
          // Handle both Supabase URLs and local paths
          const photoUrl = photo.photo_url.startsWith('http') 
            ? photo.photo_url 
            : `${API_ORIGIN}${photo.photo_url}`;
          return `
          <div class="photo-thumbnail">
            <img src="${photoUrl}" alt="${photo.caption || 'Photo'}" onclick="window.open('${photoUrl}')">
            <button class="photo-thumbnail-edit" onclick="openEditPhotoModal(${photo.id})">✎</button>
            <button class="photo-thumbnail-delete" onclick="deletePhoto(${photo.id})">×</button>
            <div class="photo-thumbnail-info">
              ${photo.event_id ? `<div>📅 ${eventMap[photo.event_id] || 'Event'}</div>` : ''}
              ${photo.folder_name ? `<div>📁 ${photo.folder_name}</div>` : ''}
              ${photo.member_tag ? `<div>👤 ${photo.member_tag}</div>` : ''}
              ${photo.caption ? `<div>${photo.caption}</div>` : ''}
            </div>
          </div>
        `;
        }).join('');
      }

      // Open edit photo modal
      function openEditPhotoModal(photoId) {
        const photo = allPhotosData.find(p => p.id === photoId);
        if (!photo) return;

        editingPhotoId = photoId;

        // Populate form
        document.getElementById('editPhotoCaption').value = photo.caption || '';
        document.getElementById('editPhotoMember').value = photo.member_tag || 'Group';
        document.getElementById('editPhotoEvent').value = photo.event_id || '';
        document.getElementById('editPhotoFolder').value = photo.folder_id || '';

        // Show modal
        document.getElementById('editPhotoModal').classList.add('active');
      }

      // Close edit photo modal
      function closeEditPhotoModal() {
        document.getElementById('editPhotoModal').classList.remove('active');
        editingPhotoId = null;
      }

      // Handle edit photo form submission
      document.getElementById('editPhotoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const editEventId = document.getElementById('editPhotoEvent').value || null;
        const editFolderId = editEventId ? null : (document.getElementById('editPhotoFolder').value || null);

        const updatedData = {
          caption: document.getElementById('editPhotoCaption').value || null,
          member_tag: document.getElementById('editPhotoMember').value,
          event_id: editEventId,
          folder_id: editFolderId
        };

        console.log('Updating photo', editingPhotoId, 'with data:', updatedData);

        try {
          const response = await fetch(`${API_URL}/photos/${editingPhotoId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify(updatedData)
          });

          if (response.status === 401) {
            localStorage.removeItem('authToken');
            authToken = null;
            throw new Error('Session expired. Please login again.');
          }

          if (!response.ok) {
            const errorMessage = await parseApiError(response, 'Failed to update photo');
            throw new Error(errorMessage);
          }

          const result = await response.json();
          console.log('Photo updated successfully:', result);
          
          // Update the cached photo data immediately
          const photoIndex = allPhotosData.findIndex(p => p.id === editingPhotoId);
          if (photoIndex !== -1) {
            allPhotosData[photoIndex] = result;
          }
          
          closeEditPhotoModal();
          showMessage('photoMessage', 'Photo updated!', 'success');
          loadPhotos();
        } catch (error) {
          console.error('Error updating photo:', error);
          alert('Error: ' + error.message);
        }
      });

      // Close modal when clicking outside
      document.getElementById('editPhotoModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('editPhotoModal')) {
          closeEditPhotoModal();
        }
      });

      // Edit event
      function editEvent(id) {
        fetch(`${API_URL}/events`)
          .then(r => r.json())
          .then(events => {
            const event = events.find(e => e.id === id);
            if (!event) return;
            editingEventId = id;
            
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDescription').value = event.description || '';
            document.getElementById('eventCategory').value = event.event_category || event.category || 'Live';
            
            // Parse date and time separately
            if (event.date) {
              const dateObj = new Date(event.date);
              const dateStr = dateObj.toISOString().slice(0, 10); // YYYY-MM-DD
              const timeStr = dateObj.toISOString().slice(11, 16); // HH:MM
              document.getElementById('eventDate').value = dateStr;
              document.getElementById('eventTime').value = timeStr;
            } else {
              document.getElementById('eventDate').value = '';
              document.getElementById('eventTime').value = '';
            }
            
            document.getElementById('eventLocation').value = event.location || '';
            document.getElementById('eventImage').value = event.image_url || '';
            document.getElementById('eventSubmitBtn').textContent = 'Save Changes';
            document.getElementById('eventCancelEditBtn').classList.remove('hidden');
            
            document.querySelector('.panel:first-child').scrollIntoView();
          });
      }
      
      // Delete event
      async function deleteEvent(id) {
        if (!confirm('Delete this event?')) return;
        try {
          const response = await fetch(`${API_URL}/events/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          });
          if (!response.ok) throw new Error('Failed to delete');
          loadEvents();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }

      // Delete photo
      async function deletePhoto(id) {
        if (!confirm('Delete this photo?')) return;
        try {
          const response = await fetch(`${API_URL}/photos/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          });
          if (!response.ok) throw new Error('Failed to delete');
          loadPhotos();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }

      // Show/hide UI
      function showDashboard() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        loadEvents();
      }

      function showMessage(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.className = `alert ${type}`;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 5000);
      }
    </script>
  </body>
</html>
